version: "3.9"

services:
  aicc-backend:
    build: ./backend
    container_name: aicc-backend
    ports:
      - "8000:8000"
    volumes:
      - ./frontend:/app/../frontend:ro
      - ./backend/data:/app/data
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DATABASE_URL=sqlite+aiosqlite:///./data/aicc_lite.db
      - DEBUG=false
      - CORS_ORIGINS=*
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
